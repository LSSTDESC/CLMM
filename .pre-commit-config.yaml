repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --unsafe-fixes]
      - id: ruff-format
        args: ["--line-length=100"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: check-toml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: https://github.com/pycqa/pylint
    rev: v3.2.5 # use the latest stable version
    hooks:
      - id: pylint
        files: ^clmm/.*\.py$
        args:
          - "--max-line-length=100"
          - "--disable=R0913, R0917"
          - "--good-names=ra,z,z1,z2,a,a1,a2,gt,gx,mu,da,i,H0,Omega_b0,Omega_dm0,Omega_k0,h,Omega_m,Omega_b,get_Omega_m,get_E2,get_E2Omega_m,_get_Omega_m,_get_E2,_get_E2Omega_m"
          - "--max-public-methods=30"
          - "--ignored-modules=astropy,astropy.coordinates,astropy.cosmology,astropy.table,astropy.units,cluster_toolkit,gi,gi.repository,gi.repository.NumCosmo,gi.repository.NumCosmoMath,healpy,matplotlib,matplotlib.pyplot,numpy,pyccl,qp,scipy,scipy.integrate,scipy.interpolate,scipy.optimize,scipy.special,scipy.stats"
          - "--max-locals=20"
          - "--max-args=20"
